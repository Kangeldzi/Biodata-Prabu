<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Profil & Foto</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        /* Background gradasi cerah lembut */
        body {
            background: linear-gradient(135deg, #e0f7fa 0%, #bbdefb 25%, #e1bee7 50%, #c8e6c9 75%, #fff9c4 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Efek partikel cahaya */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(255, 255, 255, 0.4) 0%, transparent 25%),
                radial-gradient(circle at 80% 70%, rgba(255, 255, 255, 0.3) 0%, transparent 25%),
                radial-gradient(circle at 40% 80%, rgba(255, 255, 255, 0.2) 0%, transparent 25%);
            z-index: -1;
            animation: floatBackground 30s ease-in-out infinite;
        }
        
        .container {
            max-width: 800px;
            width: 100%;
            padding: 30px;
        }
        
        .title {
            text-align: center;
            margin-bottom: 50px;
        }
        
        .title h1 {
            color: #2c3e50;
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 10px;
            letter-spacing: 1px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }
        
        .title p {
            color: #546e7a;
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.6;
            background: rgba(255, 255, 255, 0.7);
            padding: 15px 25px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        }
        
        .highlight {
            color: #3498db;
            text-shadow: 0 0 10px rgba(52, 152, 219, 0.3);
        }
        
        /* Grid 2 tombol horizontal */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 40px 30px;
            justify-items: center;
            align-items: center;
            max-width: 600px;
            margin: 0 auto;
        }
        
        /* Tombol persegi panjang dengan border radius */
        .menu-button {
            position: relative;
            width: 100%;
            max-width: 280px;
            height: 200px;
            padding: 30px 25px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 
                0 8px 25px rgba(0, 0, 0, 0.1),
                0 4px 12px rgba(255, 255, 255, 0.3);
            overflow: hidden;
            cursor: pointer;
            border: none;
            outline: none;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
        
        /* Efek border gradasi berputar */
        .menu-button::before {
            content: '';
            position: absolute;
            top: -3px;
            left: -3px;
            right: -3px;
            bottom: -3px;
            border-radius: 22px;
            background: conic-gradient(
                from 0deg,
                transparent,
                var(--primary-color),
                transparent
            );
            z-index: -2;
            animation: rotate 3s linear infinite;
            opacity: 0.8;
        }
        
        /* Latar belakang tombol */
        .menu-button::after {
            content: '';
            position: absolute;
            top: 3px;
            left: 3px;
            right: 3px;
            bottom: 3px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 18px;
            z-index: -1;
            transition: all 0.4s ease;
            box-shadow: 
                inset 0 2px 10px rgba(255, 255, 255, 0.8),
                inset 0 -2px 10px rgba(0, 0, 0, 0.05);
        }
        
        .menu-button:hover::after {
            background: rgba(255, 255, 255, 0.98);
            transform: scale(1.02);
            box-shadow: 
                inset 0 4px 15px rgba(255, 255, 255, 0.9),
                inset 0 -4px 15px rgba(0, 0, 0, 0.1);
        }
        
        /* Ikon */
        .icon {
            font-size: 55px;
            margin-bottom: 15px;
            transition: all 0.4s ease;
            z-index: 2;
        }
        
        .button-text {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 1px;
            z-index: 2;
            transition: all 0.4s ease;
            text-align: center;
        }
        
        .sub-text {
            font-size: 14px;
            margin-top: 5px;
            opacity: 0.7;
            z-index: 2;
            transition: all 0.4s ease;
            text-align: center;
        }
        
        /* Efek hover */
        .menu-button:hover {
            transform: translateY(-10px) scale(1.03);
            box-shadow: 
                0 20px 40px rgba(0, 0, 0, 0.15), 
                0 0 50px var(--primary-glow),
                0 8px 25px rgba(255, 255, 255, 0.4);
        }
        
        .menu-button:hover .icon {
            transform: scale(1.1) rotate(-5deg);
            filter: drop-shadow(0 0 15px var(--primary-glow));
        }
        
        .menu-button:hover .button-text {
            color: var(--primary-color);
            text-shadow: 0 0 15px var(--primary-glow);
        }
        
        .menu-button:hover .sub-text {
            opacity: 1;
            transform: translateY(2px);
            color: var(--primary-color);
        }
        
        /* Animasi rotasi border */
        @keyframes rotate {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes floatBackground {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(-10px, 10px) scale(1.02); }
            50% { transform: translate(10px, -10px) scale(1.04); }
            75% { transform: translate(-10px, -10px) scale(1.02); }
        }
        
        /* Animasi masuk untuk tombol */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Warna untuk tombol Profil Saya */
        .profile-btn {
            --primary-color: #3498db;
            --primary-glow: rgba(52, 152, 219, 0.6);
            animation: fadeInUp 0.6s ease 0.1s both;
        }

        .profile-btn .icon {
            color: #2980b9;
        }

        .profile-btn .button-text {
            color: #2c3e50;
        }

        .profile-btn .sub-text {
            color: #7f8c8d;
        }
        
        /* Warna untuk tombol Foto Saya */
        .photo-btn {
            --primary-color: #e74c3c;
            --primary-glow: rgba(231, 76, 60, 0.6);
            animation: fadeInUp 0.6s ease 0.2s both;
        }

        .photo-btn .icon {
            color: #c0392b;
        }

        .photo-btn .button-text {
            color: #2c3e50;
        }

        .photo-btn .sub-text {
            color: #7f8c8d;
        }
        
        /* Footer */
        .footer {
            text-align: center;
            margin-top: 60px;
            color: #7f8c8d;
            font-size: 0.85rem;
            padding: 15px;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        }
        
        /* Responsif untuk tablet */
        @media (max-width: 768px) {
            .menu-grid {
                gap: 30px 20px;
                max-width: 500px;
            }
            
            .menu-button {
                height: 180px;
                padding: 25px 20px;
            }
            
            .icon {
                font-size: 45px;
            }
            
            .button-text {
                font-size: 20px;
            }
            
            .title h1 {
                font-size: 2.2rem;
            }
        }
        
        /* Responsif untuk mobile */
        @media (max-width: 576px) {
            .menu-grid {
                grid-template-columns: 1fr;
                gap: 25px;
                max-width: 350px;
            }
            
            .menu-button {
                height: 170px;
                padding: 25px 20px;
                max-width: 100%;
            }
            
            .icon {
                font-size: 42px;
                margin-bottom: 12px;
            }
            
            .button-text {
                font-size: 18px;
            }
            
            .sub-text {
                font-size: 13px;
            }
            
            .title h1 {
                font-size: 2rem;
            }
            
            .title p {
                font-size: 1rem;
                padding: 12px 20px;
            }
        }
        
        /* Untuk layar yang sangat kecil */
        @media (max-width: 400px) {
            .menu-button {
                height: 150px;
                padding: 20px 15px;
            }
            
            .icon {
                font-size: 36px;
                margin-bottom: 10px;
            }
            
            .button-text {
                font-size: 16px;
            }
            
            .sub-text {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">
            <h1><span class="highlight">Profil</span> Saya</h1>
            <p>Informasi diri dan foto profil Saya.</p>
        </div>
        
        <!-- Grid 2 tombol horizontal -->
        <div class="menu-grid">
            <!-- REVISI: Tombol Profil Saya dengan link Google Drive -->
            <a href="https://drive.google.com/drive/folders/1obffcqYNCLqVV9_SkSF4SCxTX5Uslzus"target="_blank" 
               class="menu-button profile-btn">
                <i class="icon fas fa-user-circle"></i>
                <div class="button-text">CV & Profil Saya</div>
                <div class="sub-text">Lihat CV & Biodata</div>
            </a>
            
            <!-- REVISI: Tombol Foto Saya dengan link galeri-foto.html -->
            <a href="galeri-foto.html"target="_blank" 
               class="menu-button photo-btn">
                <i class="icon fas fa-image"></i>
                <div class="button-text">Foto Saya</div>
                <div class="sub-text">Foto Profil</div>
            </a>
        </div>
        
        <div class="footer">
            <p>© 2026 Profil Saya | Klik tombol untuk membuka halaman baru</p>
        </div>
    </div>
    
    <script>
        // Menambahkan efek interaktif pada tombol
        document.querySelectorAll('.menu-button').forEach(button => {
            // Efek klik
            button.addEventListener('click', function(e) {
                // Animasi klik
                this.style.transform = 'translateY(-5px) scale(0.97)';
                
                // Reset animasi setelah 300ms
                setTimeout(() => {
                    this.style.transform = '';
                }, 300);
                
                // Log ke console
                console.log(`Membuka halaman baru: ${this.getAttribute('href')}`);
            });
            
            // Efek hover dengan rotasi ikon yang berbeda
            button.addEventListener('mouseenter', function() {
                const icon = this.querySelector('.icon');
                
                // Rotasi ikon yang berbeda-beda
                if (icon.classList.contains('fa-user-circle')) {
                    icon.style.transform = 'scale(1.1) rotate(5deg)';
                    icon.style.textShadow = '0 0 15px var(--primary-glow)';
                } else if (icon.classList.contains('fa-image')) {
                    icon.style.transform = 'scale(1.1) rotate(-5deg)';
                    icon.style.textShadow = '0 0 15px var(--primary-glow)';
                }
            });
            
            button.addEventListener('mouseleave', function() {
                const icon = this.querySelector('.icon');
                icon.style.transform = '';
                icon.style.textShadow = '';
            });
        });
        
        // Efek partikel glow saat hover
        document.querySelectorAll('.menu-button').forEach(button => {
            button.addEventListener('mouseenter', function() {
                const particles = document.createElement('div');
                particles.style.position = 'absolute';
                particles.style.top = '0';
                particles.style.left = '0';
                particles.style.width = '100%';
                particles.style.height = '100%';
                particles.style.borderRadius = '20px';
                particles.style.background = `radial-gradient(circle at center, ${this.style.getPropertyValue('--primary-glow')} 0%, transparent 70%)`;
                particles.style.opacity = '0';
                particles.style.zIndex = '1';
                particles.style.animation = 'fadeInOut 1.2s ease';
                particles.style.pointerEvents = 'none';
                
                this.appendChild(particles);
                
                // Hapus elemen partikel setelah animasi selesai
                setTimeout(() => {
                    if (this.contains(particles)) {
                        this.removeChild(particles);
                    }
                }, 1200);
            });
        });
        
        // Tambahkan stylesheet untuk animasi partikel
        const styleSheet = document.createElement('style');
        styleSheet.textContent = `
            @keyframes fadeInOut {
                0% { opacity: 0; transform: scale(0.9); }
                50% { opacity: 0.4; transform: scale(1.05); }
                100% { opacity: 0; transform: scale(1.2); }
            }
            
            /* Efek gelombang saat klik */
            @keyframes ripple {
                0% { transform: scale(0); opacity: 0.5; }
                100% { transform: scale(1); opacity: 0; }
            }

            /* Efek cahaya pada tombol */
            .menu-button:hover::after {
                animation: pulseLight 1.5s infinite;
            }

            @keyframes pulseLight {
                0%, 100% { box-shadow: inset 0 4px 15px rgba(255, 255, 255, 0.9), inset 0 -4px 15px rgba(0, 0, 0, 0.05); }
                50% { box-shadow: inset 0 6px 20px rgba(255, 255, 255, 0.95), inset 0 -6px 20px rgba(0, 0, 0, 0.1); }
            }
        `;
        document.head.appendChild(styleSheet);
        
        // Tambahkan efek ripple saat tombol diklik
        document.querySelectorAll('.menu-button').forEach(button => {
            button.addEventListener('click', function(e) {
                // Hapus ripple sebelumnya jika ada
                const existingRipple = this.querySelector('.ripple');
                if (existingRipple) {
                    existingRipple.remove();
                }
                
                // Buat elemen ripple
                const ripple = document.createElement('span');
                ripple.classList.add('ripple');
                ripple.style.position = 'absolute';
                ripple.style.borderRadius = '50%';
                ripple.style.backgroundColor = 'rgba(255, 255, 255, 0.5)';
                ripple.style.transform = 'scale(0)';
                ripple.style.animation = 'ripple 0.6s linear';
                ripple.style.pointerEvents = 'none';
                
                // Ukuran ripple
                const size = Math.max(this.offsetWidth, this.offsetHeight);
                ripple.style.width = `${size}px`;
                ripple.style.height = `${size}px`;
                
                // Posisi ripple
                const rect = this.getBoundingClientRect();
                ripple.style.left = `${e.clientX - rect.left - size/2}px`;
                ripple.style.top = `${e.clientY - rect.top - size/2}px`;
                
                this.appendChild(ripple);
                
                // Hapus ripple setelah animasi selesai
                setTimeout(() => {
                    if (ripple.parentNode === this) {
                        this.removeChild(ripple);
                    }
                }, 600);
            });
        });

        // Tambahkan efek partikel cahaya di background
        document.addEventListener('DOMContentLoaded', function() {
            const particlesContainer = document.createElement('div');
            particlesContainer.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                pointer-events: none;
                z-index: 0;
            `;
            document.body.appendChild(particlesContainer);

            // Buat partikel cahaya
            for (let i = 0; i < 15; i++) {
                const particle = document.createElement('div');
                const size = Math.random() * 100 + 50;
                const delay = Math.random() * 30 + 10;
                const duration = Math.random() * 30 + 20;
                
                particle.style.cssText = `
                    position: absolute;
                    background: rgba(255, 255, 255, ${Math.random() * 0.6 + 0.2});
                    border-radius: 50%;
                    width: ${size}px;
                    height: ${size}px;
                    filter: blur(${Math.random() * 20 + 10}px);
                    animation: floatLight ${duration}s linear ${delay}s infinite;
                    opacity: ${Math.random() * 0.4 + 0.1};
                `;

                // Posisi random
                particle.style.left = `${Math.random() * 100}vw`;
                particle.style.top = `${Math.random() * 100}vh`;

                particlesContainer.appendChild(particle);
            }

            // Tambahkan animasi float untuk cahaya
            const lightStyle = document.createElement('style');
            lightStyle.textContent = `
                @keyframes floatLight {
                    0% { transform: translate(0, 0) rotate(0deg); }
                    25% { transform: translate(${Math.random() * 100 - 50}px, ${Math.random() * 100 - 50}px) rotate(90deg); }
                    50% { transform: translate(${Math.random() * 100 - 50}px, ${Math.random() * 100 - 50}px) rotate(180deg); }
                    75% { transform: translate(${Math.random() * 100 - 50}px, ${Math.random() * 100 - 50}px) rotate(270deg); }
                    100% { transform: translate(0, 0) rotate(360deg); }
                }
            `;
            document.head.appendChild(lightStyle);
            
            // Tambahkan efek notifikasi saat tombol diklik
            document.querySelectorAll('.menu-button').forEach(button => {
                button.addEventListener('click', function(e) {
                    const link = this.getAttribute('href');
                    const text = this.querySelector('.button-text').textContent;
                    
                    // Tampilkan notifikasi
                    showNotification(`Membuka ${text}...`);
                });
            });
        });

        // Fungsi untuk menampilkan notifikasi
        function showNotification(message) {
            // Hapus notifikasi sebelumnya
            const existingNotification = document.querySelector('.notification');
            if (existingNotification) existingNotification.remove();

            // Buat notifikasi
            const notification = document.createElement('div');
            notification.className = 'notification';
            notification.innerHTML = `
                <i class="fas fa-spinner fa-spin"></i>
                <span>${message}</span>
            `;
            
            // Style notifikasi
            notification.style.cssText = `
                position: fixed;
                bottom: 30px;
                left: 50%;
                transform: translateX(-50%);
                background: rgba(20, 20, 40, 0.9);
                backdrop-filter: blur(10px);
                color: white;
                padding: 15px 30px;
                border-radius: 12px;
                z-index: 1000;
                animation: slideUp 0.3s ease, slideDown 0.3s ease 2.7s;
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
                font-weight: 600;
                border-left: 4px solid #3498db;
                display: flex;
                align-items: center;
                gap: 12px;
                max-width: 350px;
            `;

            document.body.appendChild(notification);

            // Hapus notifikasi setelah 3 detik
            setTimeout(() => {
                if (notification.parentNode) notification.remove();
            }, 3000);
        }

        // Tambahkan style untuk animasi notifikasi
        const notificationStyle = document.createElement('style');
        notificationStyle.textContent = `
            @keyframes slideUp {
                from { transform: translateX(-50%) translateY(50px); opacity: 0; }
                to { transform: translateX(-50%) translateY(0); opacity: 1; }
            }
            
            @keyframes slideDown {
                from { transform: translateX(-50%) translateY(0); opacity: 1; }
                to { transform: translateX(-50%) translateY(50px); opacity: 0; }
            }
        `;
        document.head.appendChild(notificationStyle);
    </script>
</body>
</html>
