<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kedua Orang Tua | Elegant Portrait</title>
    <!-- Font Awesome for subtle icons (optional, for visual appeal) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', 'Segoe UI', system-ui, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #1a1c20 0%, #2b2f36 100%);
            background-attachment: fixed; /* Parallax effect on background */
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        /* Main container with subtle parallax (background moves slightly on scroll) */
        .container {
            max-width: 1200px;
            width: 100%;
            margin: 2rem auto;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(4px);
            border-radius: 4rem 1rem 4rem 1rem;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.5), inset 0 0 0 1px rgba(255, 255, 255, 0.1);
            transform: translateY(0);
            animation: floatContainer 6s ease-in-out infinite;
        }

        @keyframes floatContainer {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-8px) rotate(0.2deg); }
        }

        /* Title styling with glamorous effect */
        .title {
            text-align: center;
            font-size: clamp(2.5rem, 8vw, 4.2rem);
            font-weight: 700;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: transparent;
            -webkit-text-stroke: 2px rgba(255, 215, 0, 0.7);
            text-shadow: 0 0 20px #ffd966, 0 0 40px #b8860b, 0 10px 20px black;
            margin-bottom: 3rem;
            position: relative;
            animation: glitchTitle 3s infinite;
        }

        .title::before, .title::after {
            content: "KEDUA ORANG TUA";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            text-align: center;
            opacity: 0.6;
        }

        .title::before {
            color: #ffb6c1;
            -webkit-text-stroke: 1px #ff69b4;
            transform: translate(-2px, -2px);
            clip-path: polygon(0 0, 100% 0, 100% 45%, 0 45%);
            animation: shift 1.5s infinite ease-in-out;
        }

        .title::after {
            color: #87cefa;
            -webkit-text-stroke: 1px #1e90ff;
            transform: translate(2px, 2px);
            clip-path: polygon(0 55%, 100% 55%, 100% 100%, 0 100%);
            animation: shift 1.8s infinite ease-in-out reverse;
        }

        @keyframes shift {
            0%, 100% { transform: translate(0, 0); }
            33% { transform: translate(-3px, -2px); }
            66% { transform: translate(3px, 2px); }
        }

        /* Grid layout for two cards */
        .parents-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 3rem 2rem;
            align-items: start;
            perspective: 2000px;
        }

        /* Card styling - glassmorphism + shadow + 3D hover */
        .card {
            background: rgba(25, 25, 35, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 3rem 1rem 3rem 1rem;
            overflow: hidden;
            box-shadow: 0 35px 60px rgba(0, 0, 0, 0.6), 0 0 0 2px rgba(255, 255, 255, 0.1) inset;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            border: 1px solid rgba(255, 215, 0, 0.3);
            transform-style: preserve-3d;
            position: relative;
            animation: cardGlow 4s infinite alternate;
        }

        @keyframes cardGlow {
            0% { box-shadow: 0 35px 60px rgba(0, 0, 0, 0.6), 0 0 0 2px rgba(255, 215, 0, 0.2) inset; }
            100% { box-shadow: 0 45px 70px rgba(255, 215, 0, 0.3), 0 0 0 4px rgba(255, 215, 0, 0.5) inset; }
        }

        /* Hover effect: lift, rotate, intensify glow */
        .card:hover {
            transform: scale(1.05) translateY(-18px) rotateX(2deg) rotateY(4deg);
            box-shadow: 0 60px 90px rgba(255, 223, 0, 0.5), 0 0 0 3px #ffd700 inset;
            border-color: #ffd700;
        }

        /* Image container with parallax-like movement inside card */
        .image-wrapper {
            width: 100%;
            height: 380px;
            overflow: hidden;
            position: relative;
            background: #2d2d3a;
            border-bottom: 3px solid rgba(255, 215, 0, 0.5);
        }

        .image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center 20%;
            display: block;
            transition: transform 0.8s ease, filter 0.5s ease;
            filter: grayscale(30%) sepia(20%) brightness(0.9) contrast(1.1);
        }

        /* Parallax effect inside card: image moves slower on hover */
        .card:hover .image-wrapper img {
            transform: scale(1.15) translateY(-5%);
            filter: grayscale(0%) sepia(5%) brightness(1.1) contrast(1.2);
        }

        /* Overlay with animated gradient (for extra elegance) */
        .image-wrapper::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(255,215,0,0.2) 0%, rgba(255,140,0,0) 50%, rgba(0,0,0,0.4) 100%);
            mix-blend-mode: overlay;
            pointer-events: none;
            transition: opacity 0.5s;
        }

        .card:hover .image-wrapper::after {
            background: linear-gradient(135deg, rgba(255,223,0,0.4) 0%, rgba(255,215,0,0.2) 50%, rgba(0,0,0,0.2) 100%);
        }

        /* Caption / stats area */
        .caption {
            padding: 2rem 1.5rem 2rem 1.5rem;
            text-align: center;
            background: rgba(10, 10, 15, 0.7);
            backdrop-filter: blur(10px);
            color: #f0e9d0;
            position: relative;
            z-index: 2;
        }

        .caption h3 {
            font-size: 2.2rem;
            font-weight: 500;
            letter-spacing: 3px;
            margin-bottom: 0.6rem;
            text-transform: uppercase;
            background: linear-gradient(135deg, #fff8e7, #ffd966);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 5px 15px rgba(255, 215, 0, 0.7);
            transform: translateZ(15px);
        }

        .caption p {
            font-size: 1.2rem;
            font-weight: 300;
            color: #e0d6b0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border-top: 1px dashed rgba(255, 215, 0, 0.6);
            padding-top: 0.8rem;
            margin-top: 0.3rem;
            text-shadow: 0 2px 5px black;
        }

        .caption p i {
            color: #ffd966;
            font-size: 1.4rem;
        }

        /* Individual card border colors for father & mother */
        .card.father {
            border-left: 6px solid #4a90e2;
            border-right: 2px solid goldenrod;
        }

        .card.mother {
            border-right: 6px solid #e24a8b;
            border-left: 2px solid goldenrod;
        }

        /* Father specific hover accent */
        .card.father:hover {
            border-left-color: #00c8ff;
            border-right-color: #ffd966;
        }

        /* Mother specific hover accent */
        .card.mother:hover {
            border-right-color: #ff99cc;
            border-left-color: #ffd966;
        }

        /* subtle parallax background effect inside container (layered) */
        .container::before {
            content: '';
            position: absolute;
            top: -20px; left: -20px; right: -20px; bottom: -20px;
            background: radial-gradient(circle at 30% 40%, rgba(255, 200, 50, 0.1) 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, rgba(200, 160, 220, 0.1) 0%, transparent 40%);
            pointer-events: none;
            z-index: -1;
            animation: parallaxBg 20s infinite alternate;
        }

        @keyframes parallaxBg {
            0% { transform: translate(0%, 0%) scale(1); }
            100% { transform: translate(1%, 2%) scale(1.02); }
        }

        /* Responsive */
        @media (max-width: 750px) {
            .parents-grid {
                grid-template-columns: 1fr;
                gap: 2.5rem;
            }
            .image-wrapper {
                height: 320px;
            }
        }

        /* Additional micro-interactions: text shadow pulse */
        .caption h3 {
            animation: textPulse 3s infinite;
        }

        @keyframes textPulse {
            0%, 100% { text-shadow: 0 0 5px gold, 0 0 15px darkgoldenrod; }
            50% { text-shadow: 0 0 20px #fff0b5, 0 0 40px #ffa500; }
        }

        /* decorative icons lines (optional) */
        .icon-line {
            display: inline-block;
            width: 40px;
            height: 2px;
            background: linear-gradient(90deg, transparent, gold, transparent);
            margin: 0 10px;
            vertical-align: middle;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">KEDUA ORANG TUA</h1>

        <!-- GRID LAYOUT for 2 photos -->
        <div class="parents-grid">
            
            <!-- CARD AYAH (FATHER) - KIRI -->
            <div class="card father">
                <div class="image-wrapper">
                    <!-- Foto Ayah (placeholder dengan gaya pria) - kita pakai placeholder elegan dari unsplash/foto man with suit -->
                    <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjh1oM43gxD4iCHpHRBrrbkCHRU5MigalAWf4G5x-cTLfRRxWeeTwGqwNz8FtSdSgcexhRAIWMX7eZoOxo0b-i8kB2EUr44TCkMCZ8VVfQTJpL0AgptbY8hjsTZtqg6jbS2MMOuIVf9FvNOR-JsZr4dvrpqTQT0I5qY5OB063z38W0mTIVhQrBPTASmQp0/s1280/1000175639.jpg" 
                         alt="Potret Ayah - tampan dan bijaksana"
                         title="Ayah tercinta">
                </div>
                <div class="caption">
                    <h3>✧ ELDI SUGIANTO, S.KOM✧</h3>
                    <p><i class="fas fa-feather-alt"></i> Nama Ayah <i class="fas fa-crown"></i></p>
                    <!-- subtle elegant line under -->
                    <div style="margin-top: 0.7rem; font-size: 0.9rem; opacity: 0.7; letter-spacing: 4px;">♔ ♔ ♔</div>
                </div>
            </div>

            <!-- CARD IBU (MOTHER) - KANAN -->
            <div class="card mother">
                <div class="image-wrapper">
                    <!-- Foto Ibu (placeholder dengan gaya wanita elegan) -->
                    <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEi4wSuFVaLNG2lHxd-QIDeJD3aSix6rj5nbKVvU8-BI9r2tdoOwAIAegLmImEO2LpU_EugMJIBkYpl08ICFFqO4NzhZN8WYHN-1f2uBGyRgx-e8LpQcvb0gr-1ExbhYC_ibdBIZJVBCP7lPNd_5wosrGRwAFKylgiPW97urP7OHyh9ue2We4vuFYhsstjM/s320/1000683978.jpg" 
                         alt="Potret Ibu - anggun dan penyayang"
                         title="Ibu tersayang">
                </div>
                <div class="caption">
                    <h3>✧ AYU SAPUROH ✧</h3>
                    <p><i class="fas fa-sparkles"></i> Nama Ibu <i class="fas fa-rose"></i></p>
                    <div style="margin-top: 0.7rem; font-size: 0.9rem; opacity: 0.7; letter-spacing: 4px;">♡ ♡ ♡</div>
                </div>
            </div>
        </div>

        <!-- Teks tambahan pasangan dengan efek parallax halus (footer) -->
        <div style="text-align: center; margin-top: 4rem; color: rgba(255,245,200,0.8); font-size: 1.3rem; letter-spacing: 2px; text-shadow: 0 5px 15px black; border-top: 1px solid rgba(255,215,0,0.3); padding-top: 2rem; backdrop-filter: blur(5px);">
            <span class="icon-line"></span>  CINTA KASIH ABADI  <span class="icon-line"></span>
            <div style="font-size: 0.9rem; margin-top: 0.5rem; opacity: 0.6;">❝ segalanya karena mereka ❞</div>
        </div>
    </div>

    <!-- Catatan: script ini menggunakan gambar dari Unsplash (gratis) dengan model yang mewakili ayah dan ibu. 
    Untuk produksi, ganti dengan foto asli orang tua. Semua efek shadow, hover, parallax, animasi sudah terintegrasi. -->
</body>
</html>
