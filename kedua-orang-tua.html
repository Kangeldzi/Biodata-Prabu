<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Kedua Orang Tua | Biru Muda Elegan</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 30% 40%, #b0d4ff, #d4e8ff);
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            background-attachment: fixed;
        }

        /* GRID UTAMA - selalu 2 kolom */
        .royal-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            max-width: 900px;
            width: 100%;
            padding: 1.5rem 1rem;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(12px) saturate(180%);
            -webkit-backdrop-filter: blur(12px) saturate(180%);
            border-radius: 50px;
            border: 1px solid rgba(173, 216, 255, 0.5);
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.1), inset 0 0 30px rgba(173, 216, 255, 0.6);
            animation: fadeScale 1.2s cubic-bezier(0.2, 0.9, 0.3, 1) forwards;
        }

        /* CARD dengan gradasi biru muda - diam secara default */
        .card {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 20px 8px 20px 8px;
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.7), rgba(200, 225, 255, 0.8));
            border-radius: 40px 40px 30px 30px;
            border: 1px solid rgba(173, 216, 255, 0.6);
            box-shadow: 0 20px 30px -10px rgba(0, 0, 0, 0.1), 0 0 0 1px rgba(173, 216, 255, 0.4) inset;
            backdrop-filter: blur(5px);
            transition: all 0.4s ease;
            /* tidak ada animasi default */
            transform: translateY(0);
        }

        /* ANIMASI MELAYANG HANYA SAAT HOVER */
        .card:hover {
            animation: floatHover 1.5s infinite alternate ease-in-out;
            border-color: #7ec8ff;
            box-shadow: 0 35px 40px -8px rgba(0, 0, 0, 0.2), 0 0 30px 5px #b0e0ff, inset 0 0 30px #c9e9ff;
        }

        /* efek hover tambahan */
        .card:hover .frame {
            transform: scale(1.02);
            box-shadow: 0 0 0 3px rgba(126, 200, 255, 0.8), 0 20px 30px rgba(0,0,0,0.2), inset 0 5px 20px #ffffff;
        }

        .card:hover .photo {
            transform: scale(1.02);
            border-color: #9acdff;
            filter: brightness(1.05) saturate(1.1);
            box-shadow: 0 0 40px #b0e0ff;
        }

        .card:hover .name {
            text-shadow: 0 0 20px #7ec8ff, 0 0 40px #b0e0ff;
            letter-spacing: 3px;
        }

        /* FRAME dengan gradasi biru muda */
        .frame {
            width: min(180px, 38vw);
            height: min(180px, 38vw);
            padding: 8px;
            border-radius: 50%;
            background: linear-gradient(135deg, #b0e0ff, #7ec8ff, #9acdff);
            box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.9), 0 15px 25px rgba(0,0,0,0.1), inset 0 5px 15px #ffffff;
            margin-bottom: 12px;
            transition: all 0.4s ease;
            /* tidak ada animasi rotasi default */
        }

        /* efek bingkai berkilau biru muda */
        .frame::before {
            content: '';
            position: absolute;
            top: -4px; left: -4px; right: -4px; bottom: -4px;
            border-radius: 50%;
            padding: 4px;
            background: radial-gradient(circle at 30% 30%, #ffffff, transparent 70%);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0.5;
            pointer-events: none;
        }

        /* foto bulat */
        .photo {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #ffffff;
            box-shadow: inset 0 0 30px #e0f0ff, 0 10px 20px rgba(0,0,0,0.1);
            display: block;
            transition: 0.6s cubic-bezier(0.2, 0.8, 0.4, 1);
        }

        /* nama teks dengan gradasi biru muda */
        .name {
            font-size: clamp(1.2rem, 5vw, 2rem);
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #4a7db5, #2d5f9e, #1a4a80);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 2px 2px 10px rgba(173, 216, 255, 0.5), 0 0 20px #b0e0ff;
            margin-top: 4px;
            line-height: 1.2;
            transition: 0.3s;
        }

        /* judul utama dengan gradasi biru muda */
        .main-title {
            grid-column: 1 / -1;
            text-align: center;
            font-size: clamp(1.8rem, 8vw, 3.5rem);
            font-weight: 800;
            letter-spacing: 5px;
            text-transform: uppercase;
            background: linear-gradient(145deg, #1e4f8a, #2d5f9e, #1a3f6a);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 15px #b0e0ff, 0 0 40px #7ec8ff;
            margin-bottom: 10px;
            animation: glowPulse 3s infinite alternate;
        }

        /* role (ayah/ibu) dengan aksen biru muda */
        .role {
            font-size: clamp(0.8rem, 3.5vw, 1.2rem);
            font-weight: 300;
            color: #1e4f8a;
            text-shadow: 0 0 10px #ffffff;
            background: rgba(255, 255, 255, 0.4);
            padding: 4px 16px;
            border-radius: 40px;
            backdrop-filter: blur(5px);
            border: 1px solid #b0e0ff;
            margin-bottom: 8px;
            letter-spacing: 1px;
            white-space: nowrap;
        }

        /* gelar tambahan dengan warna biru muda */
        .sub-title {
            color: #1e4f8a;
            font-size: clamp(0.65rem, 2.8vw, 0.9rem);
            letter-spacing: 2px;
            margin-top: 4px;
            white-space: nowrap;
            text-shadow: 0 0 8px #ffffff;
        }

        /* ANIMASI KHUSUS HOVER - melayang */
        @keyframes floatHover {
            0% {
                transform: translateY(0px);
            }
            100% {
                transform: translateY(-15px);
            }
        }

        /* animasi untuk judul (tetap berjalan) */
        @keyframes glowPulse {
            0% { text-shadow: 0 0 15px #7ec8ff, 0 0 30px #b0e0ff; }
            100% { text-shadow: 0 0 30px #b0e0ff, 0 0 70px #ffffff; }
        }

        @keyframes fadeScale {
            0% { opacity: 0; transform: perspective(800px) rotateX(10deg) scale(0.9); }
            100% { opacity: 1; transform: perspective(800px) rotateX(0) scale(1); }
        }

        /* responsif mobile */
        @media (max-width: 480px) {
            .royal-grid {
                gap: 0.75rem;
                padding: 1rem 0.5rem;
            }
            
            .card {
                padding: 15px 4px;
            }
            
            .frame {
                width: min(150px, 40vw);
                height: min(150px, 40vw);
                padding: 6px;
            }
            
            .name {
                font-size: clamp(1rem, 4vw, 1.5rem);
                letter-spacing: 1px;
            }
            
            .role {
                font-size: 0.7rem;
                padding: 3px 8px;
            }
            
            .sub-title {
                font-size: 0.6rem;
                letter-spacing: 1px;
            }
        }

        @media (max-width: 360px) {
            .frame {
                width: min(120px, 35vw);
                height: min(120px, 35vw);
            }
            
            .name {
                font-size: 0.9rem;
            }
        }

        /* efek bintang latar biru muda */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            background: radial-gradient(circle at 20% 30%, #7ec8ff20 1px, transparent 1px), 
                        radial-gradient(circle at 80% 70%, #b0e0ff20 1px, transparent 1px);
            background-size: 100px 100px;
            background-attachment: fixed;
        }
    </style>
</head>
<body>
    <div class="royal-grid">
        <!-- Judul Utama -->
        <div class="main-title">KEDUA ORANG TUA</div>

        <!-- Card Ayah -->
        <div class="card">
            <div class="role">Sang Pelindung</div>
            <div class="frame">
                <!-- Foto Ayah dengan fallback -->
                <img class="photo" 
                     src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEitHwKW04cRgPXw3b8d7SBgwklv_0jmxB-cAiU3m_kPBMh459fH74hQ9O4xp3evk1E44AUsPu08yFElOe40HlvY1ouC4QDsdu2GI-IM5Jm5gXhtwOA5lQEGba2eAEX1kAV4XeG9HpUN-ouz3fn-7rzinxdhjk3GD9a8c5-FHqY0WXVwXff1ftHS4NHwRZo/s1280/1000577072.png" 
                     alt="Foto Ayah"

            <div class="name">Eldi Sugianto, S.Kom</div>
            <div class="sub-title">◈ DEWAN PELINDUNG ◈</div>

        <!-- Card Ibu -->
        <div class="card">

            <div class="sub-title">◈ PERMAISURI ◈</div>
        </div>
    </div>

    <!-- efek bintang latar -->
    <div class="stars"></div>
</body>
</html>
